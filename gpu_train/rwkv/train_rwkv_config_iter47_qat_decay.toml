# iter47 = REAL note-int2 QAT (the first genuine int-quant QAT in the project -- iter43-45 silently had
# QAT disabled). 16-epoch decay from the iter36 champion WS-final, note WKV state int2 fake-quant per step
# (RWKV_QAT_SCOPE="note:int2"); CARD is NOT in QAT scope (it keeps the fast kernel in training and gets
# rank-2 int4 LOW-RANK at DEPLOY -- low-rank QAT was a dead end, iter46, so card stays PTQ-low-rank).
# Goal: dissolve the note-int2 PTQ penalty (real QAT) on top of the card low-rank PTQ champion (0.291471)
# -> a new deployed champion below 0.291471.
# RUN WITH: RWKV_NO_JIT=1  RWKV_QAT_SCOPE="note:int2"  (NO RWKV_QAT_LOWRANK_SCOPE).
# Output = opt_qat47/rwkv_iter47_<final>.pth. Deploy gate: card:2:int4 lowrank + note:int2 + QUANT_SHIFTS.
TRAIN_USERS_START = 1
TRAIN_USERS_END = 100

VALIDATE_USERS_START = 101
VALIDATE_USERS_END = 110

TRAIN_DATASET_LMDB_PATH = "train_db"
TRAIN_DATASET_LMDB_SIZE = 4_000_000_000
VALIDATE_DATASET_LMDB_PATH = "test_db"
VALIDATE_DATASET_LMDB_SIZE = 8_000_000_000
LABEL_FILTER_LMDB_PATH = "label_filter_db"
LABEL_FILTER_LMDB_SIZE = 2_000_000_000

NUM_FETCH_PROCESSES = 7
MAX_TRAIN_GLOBAL_LEN = 20000

TRAIN_MODE = "D"
STEP_OFFSET = 1
WARMUP_STEPS = 50
EPOCHS = 16
VALIDATE_EVERY = 100
PEAK_LR = 7e-4

LOAD_MODEL = true
LOAD_MODEL_FOLDER = "pretrain/rwkv/opt_iter36"
LOAD_MODEL_NAME = "rwkv_iter36_558"
SAVE_MODEL_FOLDER = "pretrain/rwkv/opt_qat47"
SAVE_MODEL_PREFIX = "rwkv_iter47"
DEVICE = "cuda"
DTYPE = "bfloat16"

USE_WANDB = false
WANDB_PROJECT_NAME = "rwkv"
WANDB_RESUME = false
WANDB_RESUME_ID = ""
