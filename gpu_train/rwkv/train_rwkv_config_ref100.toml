# Clean reference model: train on users 1-100, save a frozen checkpoint to serve as the
# parity reference for the Rust port. In-training validation on 101-110 (no giant users).
TRAIN_USERS_START = 1
TRAIN_USERS_END = 100

VALIDATE_USERS_START = 101
VALIDATE_USERS_END = 110

TRAIN_DATASET_LMDB_PATH = "train_db"
TRAIN_DATASET_LMDB_SIZE = 4_000_000_000
VALIDATE_DATASET_LMDB_PATH = "test_db"
VALIDATE_DATASET_LMDB_SIZE = 8_000_000_000
LABEL_FILTER_LMDB_PATH = "label_filter_db"
LABEL_FILTER_LMDB_SIZE = 2_000_000_000

NUM_FETCH_PROCESSES = 7
MAX_TRAIN_GLOBAL_LEN = 20000

TRAIN_MODE = "WS"
STEP_OFFSET = 1
WARMUP_STEPS = 50
EPOCHS = 18                       # ~31 groups/epoch -> ~558 steps; converges well past plateau
VALIDATE_EVERY = 100
PEAK_LR = 7e-4

LOAD_MODEL = false
SAVE_MODEL_FOLDER = "pretrain/rwkv/ref_100"
SAVE_MODEL_PREFIX = "rwkv_ref"
DEVICE = "cuda"
DTYPE = "bfloat16"

USE_WANDB = false
WANDB_PROJECT_NAME = "rwkv"
WANDB_RESUME = false
WANDB_RESUME_ID = ""
