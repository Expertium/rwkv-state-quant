# iter44 = "improve QAT": LONGER (8-epoch) cosine decay-QAT from the iter36 champion WS-final
# (rwkv_iter36_558), per-step state quant ACTIVE on card (int2) + NOTE (int2). Doubles iter43's
# 4-epoch decay to give the model more low-LR steps to fine-tune into a quant-robust int2+int2
# minimum -- goal: shrink iter43's +0.003525 imm quant cost (build headroom for the low-rank step).
# RUN WITH: RWKV_NO_JIT=1  RWKV_QAT_SCOPE="card:int2,note:int2".
# Output = opt_qat44/rwkv_iter44_<final>.pth (export via export_latest.py -> gate at card:int2,note:int2).
TRAIN_USERS_START = 1
TRAIN_USERS_END = 100

VALIDATE_USERS_START = 101
VALIDATE_USERS_END = 110

TRAIN_DATASET_LMDB_PATH = "train_db"
TRAIN_DATASET_LMDB_SIZE = 4_000_000_000
VALIDATE_DATASET_LMDB_PATH = "test_db"
VALIDATE_DATASET_LMDB_SIZE = 8_000_000_000
LABEL_FILTER_LMDB_PATH = "label_filter_db"
LABEL_FILTER_LMDB_SIZE = 2_000_000_000

NUM_FETCH_PROCESSES = 7
MAX_TRAIN_GLOBAL_LEN = 20000

TRAIN_MODE = "D"
STEP_OFFSET = 1
WARMUP_STEPS = 50
EPOCHS = 8
VALIDATE_EVERY = 100
PEAK_LR = 7e-4

LOAD_MODEL = true
LOAD_MODEL_FOLDER = "pretrain/rwkv/opt_iter36"
LOAD_MODEL_NAME = "rwkv_iter36_558"
SAVE_MODEL_FOLDER = "pretrain/rwkv/opt_qat44"
SAVE_MODEL_PREFIX = "rwkv_iter44"
DEVICE = "cuda"
DTYPE = "bfloat16"

USE_WANDB = false
WANDB_PROJECT_NAME = "rwkv"
WANDB_RESUME = false
WANDB_RESUME_ID = ""
