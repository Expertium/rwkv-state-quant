# iter46 = FIRST REAL low-rank QAT: 8-epoch decay from the iter36 champion WS-final, with the card WKV
# state rank-2 truncated + int4 factors PER STEP during training (fake_lowrank_state, STE), note int2 QAT.
# This is genuine QAT (unlike iter43-45, which silently ran with NO fake-quant -- the champion arch was
# missing the [QAT] parser; now restored). Goal: train the model robust to the card low-rank deploy that
# already BEAT int2 under PTQ (honest imm 0.291471) -> push it lower.
# RUN WITH: RWKV_NO_JIT=1  RWKV_QAT_LOWRANK_SCOPE="card:2:int4"  RWKV_QAT_SCOPE="note:int2".
# Output = opt_qat46/rwkv_iter46_<final>.pth (deploy gate: card:2:int4 lowrank + note:int2 + QUANT_SHIFTS).
TRAIN_USERS_START = 1
TRAIN_USERS_END = 100

VALIDATE_USERS_START = 101
VALIDATE_USERS_END = 110

TRAIN_DATASET_LMDB_PATH = "train_db"
TRAIN_DATASET_LMDB_SIZE = 4_000_000_000
VALIDATE_DATASET_LMDB_PATH = "test_db"
VALIDATE_DATASET_LMDB_SIZE = 8_000_000_000
LABEL_FILTER_LMDB_PATH = "label_filter_db"
LABEL_FILTER_LMDB_SIZE = 2_000_000_000

NUM_FETCH_PROCESSES = 7
MAX_TRAIN_GLOBAL_LEN = 20000

TRAIN_MODE = "D"
STEP_OFFSET = 1
WARMUP_STEPS = 50
EPOCHS = 8
VALIDATE_EVERY = 100
PEAK_LR = 7e-4

LOAD_MODEL = true
LOAD_MODEL_FOLDER = "pretrain/rwkv/opt_iter36"
LOAD_MODEL_NAME = "rwkv_iter36_558"
SAVE_MODEL_FOLDER = "pretrain/rwkv/opt_qat46"
SAVE_MODEL_PREFIX = "rwkv_iter46"
DEVICE = "cuda"
DTYPE = "bfloat16"

USE_WANDB = false
WANDB_PROJECT_NAME = "rwkv"
WANDB_RESUME = false
WANDB_RESUME_ID = ""
