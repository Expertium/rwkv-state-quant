# Iteration-0 baseline for the optimization loop: current architecture trained on
# users 1-100 (rwkv_ref_558), evaluated on the held-out 100 users 101-200.
# bfloat16 on the CUDA parallel path (the data pipeline feeds bf16 batches). The
# tolerance is RELATIVE (delta vs iter-0), so bf16-vs-bf16 across iterations is
# internally consistent; Rust<->float32 parity is maintained separately via verify_rust.
# This config = the FIXED eval recipe for every iteration.
FILE_AHEAD = "RWKV-iter0"
FILE_IMM = "RWKV-P-iter0"

MODEL_PATH = "pretrain/rwkv/ref_100/rwkv_ref_558.pth"
DEVICE = "cuda"
DTYPE = "bfloat16"

DATASET_LMDB_PATH = "test_db"
DATASET_LMDB_SIZE = 8_000_000_000
LABEL_FILTER_LMDB_PATH = "label_filter_db"
LABEL_FILTER_LMDB_SIZE = 1_000_000_000

RAW = false
RAW_DB_PATH = "raw/result_db"
RAW_DB_SIZE = 1_000_000_000

USER_START = 101
USER_END = 200

NUM_FETCH_PROCESSES = 7
