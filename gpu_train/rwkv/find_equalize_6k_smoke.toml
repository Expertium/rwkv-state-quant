# Extend label_filter_db with the 500+500 HELD-OUT quant users (6000-6999): dev 6000-6499 + val
# 6500-6999. Held-out from champ_h2k16 training (1000-2499), the eval workbench (101-200), and
# future-proof against scaling training toward ~5k users. find_equalize APPENDS (skips existing
# users) -- non-destructive to the 1-2000 cache.
#
# ★ map_size = 2GB (NOT the 10GB in find_equalize_test_reviews_config) so the file is NOT grown past
# the export's 2GB open. The existing 2GB db has ~tens of MB used -> ~1.9GB free -> 1000 users (~30MB) fit.
DATA_PATH = "../anki-revlogs-10k"
LABEL_FILTER_LMDB_PATH = "label_filter_db"
LABEL_FILTER_LMDB_SIZE = 2_000_000_000

# Match the existing build so the equalized test set is consistent (algo-agnostic standard test points).
ALGO = "FSRS-6"
SHORT = true
SECS = true

USER_START = 6000
USER_END = 6019

PROCESSES = 8
