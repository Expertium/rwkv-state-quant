# SMOKE config: tiny user range to validate the find_equalize step end-to-end.
# Builds label_filter_db for users 1-5 (covers small user 3 used by the RNN smoke test).
DATA_PATH = "../anki-revlogs-10k"
LABEL_FILTER_LMDB_PATH = "label_filter_db"
LABEL_FILTER_LMDB_SIZE = 500_000_000   # 500 MB — Windows reserves this on disk; keep small

# Feature-engineering settings that define which reviews are in the benchmark.
ALGO = "FSRS-6"
SHORT = true
SECS = true

USER_START = 1
USER_END = 5

PROCESSES = 5   # <= 7-thread cap on this machine
