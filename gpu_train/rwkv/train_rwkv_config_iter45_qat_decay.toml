# iter45 = QAT plateau probe: 16-epoch cosine decay-QAT from the iter36 champion WS-final, card int2 +
# NOTE int2. iter43(4ep)->iter44(8ep) improved deployed imm 0.299469->0.295436 (deployed now beats fp32
# champ), so QAT was undertrained. This doubles again (8->16ep) to find where the gain plateaus / starts
# overfitting the 100-user train set (the held-out 17-user gate is the guard).
# RUN WITH: RWKV_NO_JIT=1  RWKV_QAT_SCOPE="card:int2,note:int2".
# Output = opt_qat45/rwkv_iter45_<final>.pth (export via export_latest.py -> gate at card:int2,note:int2).
TRAIN_USERS_START = 1
TRAIN_USERS_END = 100

VALIDATE_USERS_START = 101
VALIDATE_USERS_END = 110

TRAIN_DATASET_LMDB_PATH = "train_db"
TRAIN_DATASET_LMDB_SIZE = 4_000_000_000
VALIDATE_DATASET_LMDB_PATH = "test_db"
VALIDATE_DATASET_LMDB_SIZE = 8_000_000_000
LABEL_FILTER_LMDB_PATH = "label_filter_db"
LABEL_FILTER_LMDB_SIZE = 2_000_000_000

NUM_FETCH_PROCESSES = 7
MAX_TRAIN_GLOBAL_LEN = 20000

TRAIN_MODE = "D"
STEP_OFFSET = 1
WARMUP_STEPS = 50
EPOCHS = 16
VALIDATE_EVERY = 100
PEAK_LR = 7e-4

LOAD_MODEL = true
LOAD_MODEL_FOLDER = "pretrain/rwkv/opt_iter36"
LOAD_MODEL_NAME = "rwkv_iter36_558"
SAVE_MODEL_FOLDER = "pretrain/rwkv/opt_qat45"
SAVE_MODEL_PREFIX = "rwkv_iter45"
DEVICE = "cuda"
DTYPE = "bfloat16"

USE_WANDB = false
WANDB_PROJECT_NAME = "rwkv"
WANDB_RESUME = false
WANDB_RESUME_ID = ""
