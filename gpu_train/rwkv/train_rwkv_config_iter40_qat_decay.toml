# iter40 FULL WS+QAT, DECAY phase: 4-epoch (124-step) cosine decay from the WS+QAT-final
# (rwkv_iter40_558), quant still ACTIVE (card int2 + note int4).
# Before running: copy opt_qat40/rwkv_iter40_optim_558.pth -> opt_qat40/rwkv_iter40_558_optim.pth.
# RUN WITH: RWKV_NO_JIT=1  RWKV_QAT_SCOPE="card:int2,note:int4"
# Output = opt_qat40/rwkv_iter40_124.pth (the full-WS+QAT model to export + PTQ-gate).
TRAIN_USERS_START = 1
TRAIN_USERS_END = 100

VALIDATE_USERS_START = 101
VALIDATE_USERS_END = 110

TRAIN_DATASET_LMDB_PATH = "train_db"
TRAIN_DATASET_LMDB_SIZE = 4_000_000_000
