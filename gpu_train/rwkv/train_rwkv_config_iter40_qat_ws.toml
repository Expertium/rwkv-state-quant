# iter40 = FULL WS+QAT (vs iter39 = decay-only QAT). Train from scratch with per-step state quant
# ACTIVE for the WHOLE WS phase (card int2 + note int4), so weights adapt to the quant throughout,
# not just in the final decay -- should recover the +0.0025 fp32 cost the decay-only QAT left.
# RUN WITH: RWKV_NO_JIT=1  RWKV_QAT_SCOPE="card:int2,note:int4"
# WS phase (18 epochs, 558 steps) -> opt_qat40/rwkv_iter40_558.pth; then run the _decay config.
TRAIN_USERS_START = 1
TRAIN_USERS_END = 100

VALIDATE_USERS_START = 101
VALIDATE_USERS_END = 110

TRAIN_DATASET_LMDB_PATH = "train_db"
TRAIN_DATASET_LMDB_SIZE = 4_000_000_000
VALIDATE_DATASET_LMDB_PATH = "test_db"
VALIDATE_DATASET_LMDB_SIZE = 8_000_000_000
LABEL_FILTER_LMDB_PATH = "label_filter_db"
LABEL_FILTER_LMDB_SIZE = 2_000_000_000

NUM_FETCH_PROCESSES = 7
MAX_TRAIN_GLOBAL_LEN = 20000  # protocol-standard. (40k BACKFIRED: it un-drops giant >20k sequences as
# slow tiny-batch groups -> more steps+memory, util unchanged. Util is launch-bound on the QAT scan,
# not batch-bound; the real fix is a vectorized chunked scan, deferred.)

TRAIN_MODE = "WS"
STEP_OFFSET = 1
WARMUP_STEPS = 50
EPOCHS = 18
VALIDATE_EVERY = 100
PEAK_LR = 7e-4

LOAD_MODEL = false
SAVE_MODEL_FOLDER = "pretrain/rwkv/opt_qat40"
SAVE_MODEL_PREFIX = "rwkv_iter40"
DEVICE = "cuda"
DTYPE = "bfloat16"

USE_WANDB = false
WANDB_PROJECT_NAME = "rwkv"
WANDB_RESUME = false
WANDB_RESUME_ID = ""
