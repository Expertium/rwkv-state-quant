# iter39 = first STATE-QAT experiment: 4-epoch (124-step) cosine decay from the iter36 champion
# WS-final (rwkv_iter36_558), with per-step state quant ACTIVE on card (int2) + note (int4) -- the
# user's IDEAL deploy config, which FAILS under PTQ (card int4+note int4 = +0.0036; int2 worse).
# Anneals into a quant-robust minimum (mirrors how the 4-epoch decay tightened d=32 variance).
# RUN WITH: RWKV_NO_JIT=1  RWKV_QAT_SCOPE="card:int2,note:int4"  (architecture.py sets state_qmax;
# srs_model/rwkv_model run as plain Python so the quant-aware per-step WKV path executes).
# deck/preset/user keep state_qmax=inf -> fast CUDA kernel. Output = opt_qat39/rwkv_iter39_124.pth.
TRAIN_USERS_START = 1
TRAIN_USERS_END = 100

VALIDATE_USERS_START = 101
VALIDATE_USERS_END = 110

TRAIN_DATASET_LMDB_PATH = "train_db"
TRAIN_DATASET_LMDB_SIZE = 4_000_000_000
VALIDATE_DATASET_LMDB_PATH = "test_db"
VALIDATE_DATASET_LMDB_SIZE = 8_000_000_000
LABEL_FILTER_LMDB_PATH = "label_filter_db"
LABEL_FILTER_LMDB_SIZE = 2_000_000_000

NUM_FETCH_PROCESSES = 7
MAX_TRAIN_GLOBAL_LEN = 20000

TRAIN_MODE = "D"
STEP_OFFSET = 1
WARMUP_STEPS = 50
EPOCHS = 4
VALIDATE_EVERY = 100
PEAK_LR = 7e-4

LOAD_MODEL = true
LOAD_MODEL_FOLDER = "pretrain/rwkv/opt_iter36"
LOAD_MODEL_NAME = "rwkv_iter36_558"
SAVE_MODEL_FOLDER = "pretrain/rwkv/opt_qat39"
SAVE_MODEL_PREFIX = "rwkv_iter39"
DEVICE = "cuda"
DTYPE = "bfloat16"

USE_WANDB = false
WANDB_PROJECT_NAME = "rwkv"
WANDB_RESUME = false
WANDB_RESUME_ID = ""
