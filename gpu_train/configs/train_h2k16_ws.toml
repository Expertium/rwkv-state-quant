# H=2/K=16 (2x-smaller-state arch) on the 1500-user data champion recipe: 1 epoch WS on users 1000-2499,
# eval 101-200. Identical recipe to the t1500 champion EXCEPT the arch (RWKV_N_HEADS=2 RWKV_HEAD_DIM=16 in
# the run cmd -> d_model=32, K=16, per-card state 1088->576 floats). Tests whether halving the WKV state
# (and ~halving the kernel compute) holds accuracy vs the H=1/K=32 champion (0.309706/0.276357).
TRAIN_USERS_START = 1000
TRAIN_USERS_END = 2499
VALIDATE_USERS_START = 101
VALIDATE_USERS_END = 110

TRAIN_DATASET_LMDB_PATH = "train_db_sc8k_1500"
TRAIN_DATASET_LMDB_SIZE = 80_000_000_000
VALIDATE_DATASET_LMDB_PATH = "test_db"
VALIDATE_DATASET_LMDB_SIZE = 8_000_000_000
LABEL_FILTER_LMDB_PATH = "label_filter_db"
LABEL_FILTER_LMDB_SIZE = 2_000_000_000

NUM_FETCH_PROCESSES = 7
MAX_TRAIN_GLOBAL_LEN = 66000

TRAIN_MODE = "WS"
STEP_OFFSET = 1
WARMUP_STEPS = 200
EPOCHS = 1
VALIDATE_EVERY = 1000000
PEAK_LR = 1e-3

LOAD_MODEL = false
SAVE_MODEL_FOLDER = "scratchpad/exp_h2k16"
SAVE_MODEL_PREFIX = "h2k16ws"
DEVICE = "cuda"
DTYPE = "bfloat16"

USE_WANDB = false
WANDB_PROJECT_NAME = "rwkv"
WANDB_RESUME = false
WANDB_RESUME_ID = ""
